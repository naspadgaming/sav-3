<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Sav!</title>
    <!-- Mengambil Font Lucu dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLE --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            background-color: #ffdde1; /* Fallback */
            background-image: linear-gradient(to top, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Container Utama */
        .container {
            position: relative;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Halaman Awal (Tombol) */
        #start-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn-buka {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            transition: transform 0.2s;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
        }

        .btn-buka:hover {
            transform: scale(1.05);
            background: #ff5252;
        }

        /* Halaman Kejutan (Hidden Awalnya) */
        #surprise-screen {
            display: none; /* Disembunyikan dulu */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 1s ease-in-out;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: #ff6b6b;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }

        .photo-frame {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 5px solid #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            overflow: hidden;
            margin: 20px 0;
            animation: float 3s ease-in-out infinite;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        p {
            color: #555;
            line-height: 1.6;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .heart {
            color: #ff4757;
            font-size: 2rem;
            animation: beat 1s infinite;
        }

        /* Animasi */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Efek Confetti (Hiasan Jatuh) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f2d74e;
            animation: fall linear forwards;
            z-index: 1;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }

    </style>
</head>
<body>

    <!-- Audio Player (Sembunyi) -->
    <!-- Ganti 'lagu.mp3' dengan nama file lagumu -->
    <audio id="bg-music" loop>
        <source src="Sal Priadi - Iâ_d like to watch you sleeping (Official Lyric Video) (mp3cut.net).mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        
        <!-- Layar 1: Tombol Buka -->
        <div id="start-screen">
            <h2 style="margin-bottom: 20px; color: #555;">Ada sesuatu buat kamu...</h2>
            <button class="btn-buka" onclick="bukaKejutan()">Klik Disini ❤️</button>
        </div>

        <!-- Layar 2: Isi Kejutan -->
        <div id="surprise-screen">
            <h1>Happy Birthday!</h1>
            
            <div class="photo-frame">
                <!-- GANTI FOTO DISINI: Ganti src dengan nama file fotomu -->
                <img src="say.jpeg" alt="Foto Dia">
            </div>

            <p>
                Selamat ulang tahun, plas! 🎂<br>
            
                doa baikku selalu menyertai kamu<p>
            
            <div class="heart">❤️</div>
            <p style="font-size: 0.8rem; margin-top: 10px; color: #888;">From: Pacawan</p>
        </div>

    </div>

    <script>
        // --- JAVASCRIPT LOGIC ---
        
        function bukaKejutan() {
            // 1. Sembunyikan tombol, tampilkan kejutan
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('surprise-screen').style.display = 'flex';

            // 2. Putar Musik (Browser memblokir autoplay, jadi harus klik dulu)
            var audio = document.getElementById("bg-music");
            audio.play().catch(function(error) {
                console.log("Audio play failed (mungkin file tidak ditemukan): " + error);
            });

            // 3. Buat efek Confetti (Hujan kertas warna-warni)
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Posisi acak
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = -10 + 'px';
                
                // Warna acak
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                // Durasi jatuh acak
                confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                document.body.appendChild(confetti);

                // Hapus elemen setelah animasi selesai agar tidak berat
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }
    </script>
</body>
</html>
